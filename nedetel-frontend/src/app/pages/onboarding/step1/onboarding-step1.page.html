<ion-content fullscreen class="ob">
  <div class="bg"></div>

  <div class="container">
    <div class="topbar">
      <div class="badge">Onboarding</div>
    </div>

    <div class="progress">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="step">1/4</span>
    </div>

    <div class="card">
      <div class="iconWrap">
        <ion-icon name="business-outline"></ion-icon>
      </div>

      <h1>Bienvenido a <span>NEDETEL</span><br />Ciudad Digital</h1>
      <p>
        Gestiona visitas, trabajos, mantenimiento, equipos, limpieza y reportes
        desde un solo lugar.
      </p>

      <div class="highlights">
        <div class="pill">✔ Control</div>
        <div class="pill">✔ Trazabilidad</div>
        <div class="pill">✔ Reportes</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn primary" (click)="next()">
        Siguiente
        <ion-icon name="arrow-forward-outline"></ion-icon>
      </button>
    </div>
  </div>
</ion-content>
