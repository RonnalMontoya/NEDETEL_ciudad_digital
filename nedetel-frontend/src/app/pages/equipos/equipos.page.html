<ion-header class="page-header-primary">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="back()">
        <ion-icon slot="start" name="arrow-back"></ion-icon>
        VOLVER
      </ion-button>
    </ion-buttons>

    <ion-title>
      <ion-icon name="server"></ion-icon> EQUIPOS
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="page-content">
  <div class="wrap">
    <!-- CARD: REGISTRO -->
    <ion-card class="page-card">
      <ion-card-header>
        <ion-card-title>
          <ion-icon name="add-circle"></ion-icon>
          Registrar Equipo
        </ion-card-title>
      </ion-card-header>

      <ion-card-content>
        <ion-item lines="none" class="field">
          <ion-label position="stacked">Equipamiento</ion-label>
          <ion-input
            [(ngModel)]="title"
            placeholder="Ej: Switch 24 puertos"
          ></ion-input>
        </ion-item>

        <ion-item lines="none" class="field">
          <ion-label position="stacked">Detalles (opcional)</ion-label>
          <ion-textarea
            [(ngModel)]="description"
            autoGrow="true"
            placeholder="Ej: Modelo, serie, especificaciones, ubicación..."
          ></ion-textarea>
        </ion-item>

        <ion-item lines="none" class="field">
          <ion-label position="stacked">Fecha de Registro</ion-label>
          <ion-datetime
            [(ngModel)]="dateISO"
            presentation="date-time"
          ></ion-datetime>
        </ion-item>

        <ion-button expand="block" class="btn-save" (click)="save()">
          <ion-icon slot="start" name="save"></ion-icon>
          Guardar Equipo
        </ion-button>

        <div class="error-message" *ngIf="errorMsg">
          <ion-icon name="alert-circle"></ion-icon>
          {{ errorMsg }}
        </div>
      </ion-card-content>
    </ion-card>

    <!-- HEADER: LISTADO -->
    <div class="section-header">
      <ion-icon name="list"></ion-icon>
      <h2>Equipos Registrados</h2>
    </div>

    <!-- LOADING -->
    <div class="empty-state" *ngIf="isLoading">
      <ion-spinner></ion-spinner>
      <p>Cargando equipos...</p>
    </div>

    <!-- EMPTY -->
    <div class="empty-state" *ngIf="!isLoading && items.length === 0">
      <ion-icon name="server"></ion-icon>
      <p>No hay equipos registrados aún</p>
    </div>

    <!-- LIST -->
    <div class="activities-list" *ngIf="!isLoading && items.length > 0">
      <div class="activity-item" *ngFor="let it of items">
        <div class="activity-content">
          <div class="activity-title">{{ it.title }}</div>

          <div class="activity-meta">
            <span class="meta-item">
              <ion-icon name="calendar"></ion-icon>
              {{ it.dateISO | date:'dd/MM/yyyy' }}
            </span>
          </div>

          <div class="activity-description" *ngIf="it.description">
            {{ it.description }}
          </div>
        </div>

        <ion-button fill="clear" color="danger" size="small" (click)="remove(it.id)">
          <ion-icon slot="icon-only" name="trash"></ion-icon>
        </ion-button>
      </div>
    </div>
  </div>
</ion-content>
